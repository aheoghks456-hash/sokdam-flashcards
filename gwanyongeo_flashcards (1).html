<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>관용어 플래시카드</title>
<style>
:root{--bg:#f7f8ff;--card:#282828;--card2:#fff;--txt:#111827;--muted:#667085;--line:#e3e7ef;--blue:#3858ff;--green:#16a34a;--red:#ef4444;}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:linear-gradient(135deg,#f8fbff,#f6fff8);color:var(--txt)}
.wrap{max-width:820px;margin:0 auto;padding:22px 16px 32px} header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px} h1{font-size:24px;margin:0} .sub{color:var(--muted);font-size:14px;margin-top:4px} .tools{display:flex;gap:8px;flex-wrap:wrap} button{border:1px solid #d8def0;background:#fff;border-radius:999px;padding:10px 14px;font-size:15px;cursor:pointer} button.primary{border-color:var(--blue);color:var(--blue)}
.progress{height:10px;background:#e8ecf7;border-radius:99px;overflow:hidden;margin:14px 0 18px} .bar{height:100%;width:0;background:#3858ff;transition:.2s}
.card{min-height:390px;border-radius:28px;padding:26px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 15px 40px rgba(40,50,90,.12);border:1px solid var(--line);transition:.25s;user-select:none}
.card.front{background:var(--card);color:white} .card.back{background:var(--card2);color:var(--txt)} .count{font-weight:700;color:#aeb7cf;font-size:14px} .front .count{color:#b9c2d8} .term{font-size:34px;line-height:1.35;word-break:keep-all;white-space:pre-wrap} .label{color:#8992a8;font-size:14px;text-align:center;margin-top:20px} .back .label{color:#6b7280}
.nav{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:18px;flex-wrap:wrap} .circle{width:58px;height:58px;border-radius:999px;font-size:24px;display:flex;align-items:center;justify-content:center} .bad{color:var(--red)} .good{color:var(--green)} .score{min-width:86px;text-align:center;font-weight:700}
.empty{background:white;padding:30px;border-radius:24px;border:1px solid var(--line);line-height:1.8} .small{font-size:13px;color:var(--muted)}
@media(max-width:560px){h1{font-size:20px} .term{font-size:27px} .card{min-height:360px;padding:22px} .circle{width:52px;height:52px}}
</style></head><body><div class="wrap">
<header><div><h1>관용어 플래시카드</h1><div class="sub">카드를 누르면 정답/설명이 보입니다.</div></div><div class="tools"><button onclick="shuffleCards()">섞기</button><button onclick="resetAll()">처음부터</button></div></header>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="app"></div>
<div class="small" style="margin-top:18px">※ 소스 자료에 있는 표현과 뜻을 바탕으로 구성했습니다. 현재 관용어 자료에는 카드화할 목록이 없습니다.</div>
</div><script>
const CARDS=[];
let order=[...CARDS.keys()], idx=0, flipped=false, right=0, wrong=0;
const app=document.getElementById('app'); const bar=document.getElementById('bar');
function render(){
 if(!CARDS.length){app.innerHTML=`<div class="empty"><b>카드를 만들 수 없습니다.</b><br>업로드된 관용어 PDF에는 관용어 목록과 뜻이 없고, '그림으로 표현하기' 활동 안내만 들어 있습니다.<br><br>관용어 사전 PDF나 관용어 목록이 있는 자료를 올리면 같은 형태로 바로 만들어드릴 수 있습니다.</div>`;bar.style.width='0%';return;}
 const c=CARDS[order[idx]]; const side=flipped?'back':'front'; const text=flipped?c.back:c.front;
 bar.style.width=((idx+1)/CARDS.length*100)+'%';
 app.innerHTML=`<div class="card ${side}" onclick="flip()"><div class="count">${idx+1}/${CARDS.length}</div><div class="term">${escapeHtml(text)}</div><div class="label">${flipped?'카드를 누르면 앞면으로 돌아갑니다':'정답 보기'}</div></div>
 <div class="nav"><button class="circle primary" onclick="event.stopPropagation();prev()">←</button><button class="score bad" onclick="event.stopPropagation();mark(false)">✕ ${wrong}</button><button class="score good" onclick="event.stopPropagation();mark(true)">${right} ✓</button><button class="circle primary" onclick="event.stopPropagation();next()">→</button></div>`;
}
function escapeHtml(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function flip(){flipped=!flipped;render();} function next(){idx=(idx+1)%order.length;flipped=false;render();} function prev(){idx=(idx-1+order.length)%order.length;flipped=false;render();}
function mark(ok){ok?right++:wrong++;next();} function shuffleCards(){for(let i=order.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]]}idx=0;flipped=false;render();}
function resetAll(){order=[...CARDS.keys()];idx=0;flipped=false;right=0;wrong=0;render();}
render();
</script></body></html>
